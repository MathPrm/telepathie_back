services:
  db:
    image: postgres:17-alpine
    container_name: telepathie_db_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: telepathie_api
    ports:
      - "${PORT}:${PORT}"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - PORT=${PORT}
      - DB_USER=${DB_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${DB_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - db
    volumes:
      - ./:/app
      - /app/node_modules

  front:
    build:
      context: ../telepathie_front
    container_name: telepathie_front
    ports:
      - "5173:5173"
    env_file:
      - ../telepathie_front/.env
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
    volumes:
      - ../telepathie_front:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data: